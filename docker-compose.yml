services:
  backend:
    build:
      context: .
      dockerfile: backend/Dockerfile
    environment:
      PYTHONUNBUFFERED: "1"
    ports:
      - "8000:8000"

  frontend:
    build:
      context: .
      dockerfile: frontend/Dockerfile
    depends_on:
      - backend
    ports:
      - "5173:80"

